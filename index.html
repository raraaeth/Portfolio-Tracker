<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Command Center</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:#f8fafc;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
}

.cards{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.section{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.section h2{
    margin-bottom:15px;
    color:#38bdf8;
}

.total-portfolio{
    text-align:center;
}

.total-portfolio .value{
    font-size:48px;
    font-weight:bold;
    margin-top:10px;
}

.price-grid{
    display:grid;
    grid-template-columns:
    repeat(4,1fr);
    gap:10px;
}

.price-box{
    background:#0f172a;
    padding:8px;
    border-radius:10px;
    text-align:center;
}

.price-box h3{
    margin-bottom:4px;
    font-size:13px;
    color:#94a3b8;
}

.price{
    font-size:16px;
    font-weight:bold;
    color:#38bdf8;
}

.filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

select{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
}

.stat-card{
    text-align:center;
}

.stat-card .number{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

canvas{
    max-height:450px;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:#38bdf8;
}

th,td{
    padding:10px;
    border:1px solid #334155;
    text-align:left;
}

tr:hover{
    background:#334155;
}

.masuk{
    color:#22c55e;
}

.keluar{
    color:#ef4444;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>💎 Crypto Command Center</h1>

<!-- TOTAL PORTFOLIO -->

<div class="card total-portfolio">

    <h2>Total Portfolio</h2>

    <div class="value" id="totalPortfolio">
        Loading...
    </div>

</div>

<!-- HARGA LIVE -->

<div class="section">

<h2>📈 Harga Live</h2>

<div class="price-grid">

    <div class="price-box">
        <h3>USDT</h3>
        <div class="price" id="priceUSDT">$0</div>
    </div>

    <div class="price-box">
        <h3>BNB</h3>
        <div class="price" id="priceBNB">$0</div>
    </div>

    <div class="price-box">
        <h3>ETH</h3>
        <div class="price" id="priceETH">$0</div>
    </div>

    <div class="price-box">
        <h3>SOL</h3>
        <div class="price" id="priceSOL">$0</div>
    </div>

</div>

</div>

<!-- FILTER -->

<div class="filters">

<select id="walletFilter">
    <option value="">
        Semua Wallet
    </option>
</select>

<select id="periodeFilter">

    <option value="7">
        1 Minggu
    </option>

    <option value="30" selected>
        1 Bulan
    </option>

    <option value="90">
        3 Bulan
    </option>

    <option value="180">
        6 Bulan
    </option>

    <option value="365">
        1 Tahun
    </option>

</select>

</div>

<!-- STATISTIK -->

<div class="cards">

<div class="card stat-card">

    <h3>📥 Total Masuk</h3>

    <div class="number" id="totalMasuk">
        $0
    </div>

</div>

<div class="card stat-card">

    <h3>📤 Total Keluar</h3>

    <div class="number" id="totalKeluar">
        $0
    </div>

</div>

<div class="card stat-card">

    <h3>🎁 Total Airdrop</h3>

    <div class="number" id="totalAirdrop">
        0
    </div>

</div>

<div class="card stat-card">

    <h3>💵 Total Cash Out</h3>

    <div class="number" id="totalCashout">
        $0
    </div>

</div>

</div>

<!-- WALLET CHART -->

<div class="section">

<h2>🏦 Wallet Allocation</h2>

<canvas id="walletChart"></canvas>

</div>

<!-- ASSET CHART -->

<div class="section">

<h2>🪙 Asset Allocation</h2>

<canvas id="assetChart"></canvas>

</div>

<!-- TRANSAKSI -->

<div class="section">

<h2>📋 Riwayat Transaksi</h2>

<div class="table-wrapper">

<table id="transaksiTable">

<thead>
<tr>
<th>Tanggal</th>
<th>Wallet</th>
<th>Jenis</th>
<th>Asset</th>
<th>Amount</th>
<th>Keterangan</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<!-- JAVASCRIPT AKAN DITAMBAHKAN DI SINI -->
<script>

const PORTOFOLIO_URL =
'https://opensheet.elk.sh/1Wnje_mKu73eJyq0a8QlYETunfCCf2ntSKerV5J8qT30/portofolio';

const TRANSAKSI_URL =
'https://opensheet.elk.sh/1Wnje_mKu73eJyq0a8QlYETunfCCf2ntSKerV5J8qT30/transaksi';

const VALID_ASSETS = [
    'USDT',
    'BNB',
    'ETH',
    'SOL'
];

let portfolioData = [];
let transaksiData = [];
let prices = {};

let walletChart = null;
let assetChart = null;

function usd(n){

    return '$' +
    Number(n).toLocaleString(
        'en-US',
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}

async function loadData(){

    try{

        const [portfolioRes, transaksiRes] =
        await Promise.all([

            fetch(PORTOFOLIO_URL),
            fetch(TRANSAKSI_URL)

        ]);

        portfolioData =
        await portfolioRes.json();

        transaksiData =
        await transaksiRes.json();

        await loadPrices();

    }catch(err){

        console.error(err);

        alert(
            'Gagal mengambil data spreadsheet'
        );

    }

}

async function loadPrices(){

    const url =
    'https://api.coingecko.com/api/v3/simple/price?ids=tether,binancecoin,ethereum,solana&vs_currencies=usd';

    const res =
    await fetch(url);

    const data =
    await res.json();

    prices = {

        USDT:
        data.tether.usd,

        BNB:
        data.binancecoin.usd,

        ETH:
        data.ethereum.usd,

        SOL:
        data.solana.usd

    };

    document.getElementById(
        'priceUSDT'
    ).innerText =
    usd(prices.USDT);

    document.getElementById(
        'priceBNB'
    ).innerText =
    usd(prices.BNB);

    document.getElementById(
        'priceETH'
    ).innerText =
    usd(prices.ETH);

    document.getElementById(
        'priceSOL'
    ).innerText =
    usd(prices.SOL);

    hitungPortfolio();

}

function hitungPortfolio(){

    let totalPortfolio = 0;

    portfolioData.forEach(item => {

        const asset =
            item.Asset;

        const amount =
            Number(item.Amount || 0);

        if(
            VALID_ASSETS.includes(asset)
        ){

            totalPortfolio +=
            amount *
            prices[asset];

        }

    });

    document.getElementById(
        'totalPortfolio'
    ).innerText =
    usd(totalPortfolio);

}

loadData();

</script>
    
</body>
</html>
