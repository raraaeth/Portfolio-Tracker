<!DOCTYPE html><html lang="id">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Crypto Portfolio Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><!-- =========================
     LIVE PRICE SECTION
========================= -->

<section class="live-price-card">

    <div class="price-item">
        <span>BTC</span>
        <strong id="btcPrice">$0</strong>
    </div>

    <div class="price-item">
        <span>BNB</span>
        <strong id="bnbPrice">$0</strong>
    </div>

    <div class="price-item">
        <span>ETH</span>
        <strong id="ethPrice">$0</strong>
    </div>

    <div class="price-item">
        <span>SOL</span>
        <strong id="solPrice">$0</strong>
    </div>

</section>

<!-- END LIVE PRICE SECTION -->


<!-- =========================
     HEADER SECTION
========================= -->

<section class="header-card">

    <h1>Hai, Raraa! 👋</h1>

    <p>Lihat saldo kamu hari ini</p>

</section>

<!-- END HEADER SECTION -->


<!-- =========================
     PORTFOLIO & AIRDROP
========================= -->

<section class="portfolio-grid">

    <div class="portfolio-card">

        <p>Total Portfolio</p>

        <h2 id="portfolioValue">
            $0.00
        </h2>

    </div>

    <div class="airdrop-card">

        <p>Airdrop</p>

        <h2 id="airdropCount">
            0
        </h2>

    </div>

</section>

<!-- END PORTFOLIO & AIRDROP -->


<!-- =========================
     PNL SECTION
========================= -->

<section class="pnl-grid">

    <div class="pnl-card">

        <p>PnL Mingguan</p>

        <h3 id="weeklyPnl">
            $0
        </h3>

    </div>

    <div class="pnl-card">

        <p>PnL Bulanan</p>

        <h3 id="monthlyPnl">
            $0
        </h3>

    </div>

</section>

<!-- END PNL SECTION -->


<!-- =========================
     WALLET ALLOCATION
========================= -->

<section class="wallet-card">

    <h2>Wallet Allocation</h2>

    <canvas id="walletChart"></canvas>

</section>

<!-- END WALLET ALLOCATION -->


<!-- =========================
     ACTIVITIES SECTION
========================= -->

<section class="activities-card">

    <div class="activities-header">

        <h2>Activities</h2>

        <div class="filters">

            <select id="walletFilter" multiple>

            </select>

            <select id="periodFilter">

                <option value="1">1 Bulan</option>
                <option value="3">3 Bulan</option>
                <option value="6">6 Bulan</option>
                <option value="12">1 Tahun</option>

            </select>

        </div>

    </div>

    <table>

        <thead>

            <tr>
                <th>Tanggal</th>
                <th>Wallet</th>
                <th>Jenis</th>
                <th>Asset</th>
                <th>Amount</th>
                <th>Keterangan</th>
            </tr>

        </thead>

        <tbody id="activityTable">

        </tbody>

    </table>

</section>

<!-- END ACTIVITIES SECTION -->


<!-- =========================
     BALANCE COMPARISON
========================= -->

<section class="comparison-card">

    <h2>Balance Comparison</h2>

    <canvas id="balanceChart"></canvas>

</section>

<!-- END BALANCE COMPARISON -->

</div><!-- =========================
     CHART JS
========================= --><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><!-- END CHART JS --><!-- =========================
     JAVASCRIPT
========================= --><script src="script.js"></script><!-- END JAVASCRIPT --></body>
    </html>
